[workspace]
members = [
    "backend/auth-api"
]
resolver = "2"

[workspace.dependencies]
axum = "0.8.9"
tokio = { version = "1.52.3", features = ["rt-multi-thread", "time"]}
reqwest = { version = "0.13.4", features = ["form", "json"] }
rdkafka = { version = "0.39.0", features = ["tokio", "cmake-build"] }